name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: appdb
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U appuser -d appdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations + tests
        working-directory: backend
        env:
          DB_NAME: appdb
          DB_USER: appuser
          DB_PASSWORD: apppass
          DB_HOST: 127.0.0.1
          DB_PORT: 5432

          RESEND_API_KEY: "dummy"
          DEFAULT_FROM_EMAIL: "Egzibicija Pab Kviz <onboarding@resend.dev>"
        run: |
          python manage.py migrate
          python manage.py test

  docker-build:
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images (compose)
        env:
          NEXT_PUBLIC_MAPTILER_KEY: "dummy"
        run: |
          docker compose build