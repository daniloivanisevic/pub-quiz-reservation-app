name: CI/CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test-backend:
    name: Backend tests (Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: appdb
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U appuser -d appdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations + tests
        working-directory: backend
        env:
          DB_NAME: appdb
          DB_USER: appuser
          DB_PASSWORD: apppass
          DB_HOST: 127.0.0.1
          DB_PORT: 5432

          
          RESEND_API_KEY: "dummy"
          DEFAULT_FROM_EMAIL: "Egzibicija Pab Kviz <onboarding@resend.dev>"
        run: |
          python manage.py migrate
          python manage.py test

  docker-build:
    name: Build Docker images (compose)
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        env:
          NEXT_PUBLIC_MAPTILER_KEY: "dummy"
        run: |
          docker compose build

  deploy-render:
    name: Deploy to Render (CD)
    runs-on: ubuntu-latest
    needs: docker-build

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hooks
        env:
          
          RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
          RENDER_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_BACKEND_DEPLOY_HOOK" ] || [ -z "$RENDER_FRONTEND_DEPLOY_HOOK" ]; then
            echo "Missing Render deploy hook secrets. Add RENDER_BACKEND_DEPLOY_HOOK and RENDER_FRONTEND_DEPLOY_HOOK in GitHub Secrets."
            exit 1
          fi

          echo "Trigger backend deploy..."
          curl -fsS -X POST "$RENDER_BACKEND_DEPLOY_HOOK"

          echo "Trigger frontend deploy..."
          curl -fsS -X POST "$RENDER_FRONTEND_DEPLOY_HOOK"

          echo "Deploy hooks triggered."